<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="UPDATE SIM - Simulador de monitor multiparamétrico y desfibrilador para entrenamiento médico" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
    <link rel="icon" href="favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <title>UPDATE SIM — Monitor Multiparamétrico</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        background: #000;
        overflow: hidden;
        width: 100%;
        height: 100%;
      }
      #safe-area {
        position: fixed;
        top: env(safe-area-inset-top, 0px);
        bottom: env(safe-area-inset-bottom, 0px);
        left: env(safe-area-inset-left, 0px);
        right: env(safe-area-inset-right, 0px);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      #root {
        width: 1024px;
        height: 768px;
        transform-origin: center center;
        overflow: hidden;
      }
    </style>
    <script>
      function scaleApp() {
        var r = document.getElementById('root');
        var sa = document.getElementById('safe-area');
        if (!r || !sa) return;
        var s = Math.min(sa.clientWidth / 1024, sa.clientHeight / 768);
        r.style.transform = 'scale(' + s + ')';
      }
      window.addEventListener('load', scaleApp);
      window.addEventListener('resize', scaleApp);
      window.addEventListener('orientationchange', function(){ setTimeout(scaleApp, 300); });
      setInterval(scaleApp, 2000);
    </script>
  </head>
  <body>
    <div id="safe-area"><div id="root"></div></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
