<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="description" content="UPDATE SIM - Simulador de monitor multiparamétrico y desfibrilador para entrenamiento médico" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
    <link rel="icon" href="favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <style>
      @font-face {
        font-family: 'JetBrains Mono';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url('fonts/JetBrainsMono-Regular.woff2') format('woff2');
      }
      @font-face {
        font-family: 'JetBrains Mono';
        font-style: normal;
        font-weight: 700;
        font-display: swap;
        src: url('fonts/JetBrainsMono-Bold.woff2') format('woff2');
      }
    </style>
    <title>UPDATE SIM — Monitor Multiparamétrico</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        background: #000;
        overflow: hidden;
        width: 100%;
        height: 100%;
      }
      #safe-area {
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      #root {
        width: 1024px;
        height: 768px;
        transform-origin: center center;
        overflow: hidden;
      }
      /* Force landscape - block portrait view */
      #portrait-block {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #000;
        color: #555;
        font-family: 'JetBrains Mono', monospace;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        text-align: center;
        padding: 40px;
      }
      #portrait-block svg {
        animation: rotateHint 2s ease-in-out infinite;
      }
      @keyframes rotateHint {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(90deg); }
      }
      @media (orientation: portrait) {
        #portrait-block { display: flex !important; }
        #safe-area { display: none !important; }
      }
    </style>
    <script>
      function scaleApp() {
        var r = document.getElementById('root');
        var sa = document.getElementById('safe-area');
        if (!r || !sa) return;
        var sw = sa.clientWidth;
        var sh = sa.clientHeight;
        var s = Math.min(sw / 1024, sh / 768);
        r.style.transform = 'scale(' + s + ')';
      }
      window.addEventListener('load', function() {
        scaleApp();
        // Try to lock orientation to landscape
        if (screen.orientation && screen.orientation.lock) {
          screen.orientation.lock('landscape').catch(function(){});
        }
      });
      window.addEventListener('resize', scaleApp);
      window.addEventListener('orientationchange', function(){ setTimeout(scaleApp, 300); });
      setInterval(scaleApp, 2000);
    </script>
  </head>
  <body>
    <div id="portrait-block">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.5">
        <rect x="4" y="2" width="16" height="20" rx="2"/>
        <line x1="12" y1="18" x2="12" y2="18.01" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span style="font-size:14px;">Gira tu dispositivo a horizontal</span>
      <span style="font-size:11px;">Rotate your device to landscape</span>
    </div>
    <div id="safe-area"><div id="root"></div></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
